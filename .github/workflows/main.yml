name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev bzip2 dirmngr
        # Global environment conflicts se bachne ke liye --user flag lazmi hai
        pip install --user --upgrade pip
        pip install --user cython==0.29.33 virtualenv buildozer

    - name: Build with Buildozer
      run: |
        # User binaries ka path explicitly set karein taake buildozer executable mil sake
        export PATH=$PATH:~/.local/bin
        buildozer android clean
        yes | buildozer android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: creditbook-apk
        path: bin/*.apk
